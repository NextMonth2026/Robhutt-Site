<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pitch Detail | Rob Hutt</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500;700&display=swap" rel="stylesheet"><style>:root{--ink:#0d0b08;--paper:#f4efe6;--paper2:#e8dfcf;--gold:#c8962a;--gold2:#e8b13d;--rust:#9a3a1f;--line:rgba(13,11,8,.16);--dark:#15110b;--mono:'Spline Sans Mono',ui-monospace,monospace;--display:'Fraunces',Georgia,serif}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--display)}.wrap{padding:clamp(24px,5vw,70px);max-width:1220px;margin:auto}.kicker,.label{font:700 12px var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}h1{font-size:clamp(2.6rem,6vw,5.8rem);line-height:.96;font-weight:300;letter-spacing:-.04em;margin:18px 0}.grid{display:grid;grid-template-columns:1fr .8fr;gap:20px}.panel{background:rgba(232,223,207,.6);border:1px solid var(--line);border-radius:8px;padding:24px}.dark{background:linear-gradient(160deg,#15110b,#20170d);color:var(--paper);border-color:rgba(232,177,61,.18)}.dark p{color:rgba(244,239,230,.76)}p,li,td,th{font-size:1.02rem;line-height:1.5}.muted{color:rgba(13,11,8,.62)}.mono,pre,input,textarea,select{font:500 13px var(--mono)}pre{white-space:pre-wrap;word-break:break-word}.status{display:inline-flex;border:1px solid rgba(154,58,31,.28);border-radius:999px;padding:7px 10px;background:rgba(244,239,230,.55);font:700 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--rust)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.btn{border:0;border-radius:3px;background:var(--gold2);color:var(--ink);padding:12px 14px;font:700 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;cursor:pointer}.btn.ghost{background:transparent;border:1px solid var(--line)}.dark .btn.ghost{color:var(--paper);border-color:rgba(244,239,230,.24)}.timeline{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.follow{font-size:1.35rem;color:var(--rust)}.hero-preview,.hero-placeholder{width:100%;border-radius:8px;border:1px solid var(--line);margin-top:12px}.hero-preview{display:block;max-height:260px;object-fit:cover}.hero-placeholder{display:grid;place-items:center;min-height:180px;background:rgba(13,11,8,.07);font:700 12px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:rgba(13,11,8,.55)}table{width:100%;border-collapse:collapse;margin-top:18px}th,td{text-align:left;border-top:1px solid var(--line);padding:12px;vertical-align:top}input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(244,239,230,.8);padding:10px;margin:6px 0 12px}textarea{min-height:90px}.form{display:none}.toast{position:fixed;right:18px;bottom:18px;background:var(--dark);color:var(--paper);padding:14px 16px;border-radius:6px;font:700 12px var(--mono);opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}@media(max-width:900px){.grid,.timeline{grid-template-columns:1fr}}</style></head><body><main class="wrap" id="app"></main><div class="toast" id="toast">Copied</div><script type="module">import{getOpportunityRecords,createPitchForAlternative}from'/assets/js/opportunities.js';const slug=location.pathname.split('/').filter(Boolean).pop();const opportunities=getOpportunityRecords();const o=opportunities[slug];const root=location.origin;const $=id=>document.getElementById(id);const imageStatuses=['needed','drafted','generated','approved'];const esc=s=>(s||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));const isUrl=value=>/^https?:/.test(value||'');function copy(text){navigator.clipboard.writeText(text);$('toast').textContent='Copied';$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1200)}function toast(text){$('toast').textContent=text;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1600)}function altStatus(t){return sessionStorage.getItem(`alt-status:${slug}:${t.priority}`)||t.status||'not_contacted'}function fitWarning(fit){return fit==='weak'?'This may not be a strong fit. Adjust the concept before sending.':fit==='possible'?'Review positioning before sending.':''}function markAlt(priority,status){sessionStorage.setItem(`alt-status:${slug}:${priority}`,status);render()}function copyAsNew(priority){const result=createPitchForAlternative(slug,priority);if(!result){toast('Could not create pitch');return;}sessionStorage.setItem(`alt-status:${slug}:${priority}`,'drafted');toast('New pitch created');setTimeout(()=>location.href=`/admin/pitches/${result.slug}`,500)}function load(){return{...(o.pitchAdmin||{}),...JSON.parse(sessionStorage.getItem(`pitch-crm:${slug}`)||'{}')}}function save(d){sessionStorage.setItem(`pitch-crm:${slug}`,JSON.stringify(d));render()}function fmt(d){return d?new Date(`${d}T00:00:00`).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—'}function contact(a){const l=a.contact||{};return{name:a.contactName||l.name||'',role:a.contactRole||l.role||'',email:a.contactEmail||l.email||'',phone:a.contactPhone||l.phone||'',linkedin:a.contactLinkedIn||l.linkedinUrl||'',notes:a.relationshipNotes||l.notes||''}}function render(){if(!o){$('app').innerHTML='<p>Pitch not found. <a href="/admin/pitches">Back to pitches</a></p>';return}const a=load();const c=contact(a);const privateUrl=`${root}/opportunities/${slug}`;const imageStatus=sessionStorage.getItem(`pitch-image-status:${slug}`)||o.imagePromptStatus||'needed';const prompt=o.imagePrompt||'';const hero=isUrl(o.heroImage)?`<img class="hero-preview" src="${esc(o.heroImage)}" alt="${esc(o.campaignTitle)} hero preview">`:`<div class="hero-placeholder">No generated hero image yet.</div>`;const log=[...(a.activityLog||[])].sort((x,y)=>(y.date||'').localeCompare(x.date||''));const last=log[0]||{};const email=`Subject:\nA private campaign idea for ${o.companyName}\n\nBody:\nHi ${c.name||'there'},\n\nI put together a private concept for ${o.companyName} because I noticed a customer story I think you could own more visibly.\n\nPrivate link: ${privateUrl}\nAccess code: ${o.password}\n\nI would value your thoughts if it feels relevant.\n\nRob`; $('app').innerHTML=`<a class="btn ghost" href="/admin/pitches">Back to pitches</a><div class="kicker">Pitch detail</div><h1>${o.companyName}: ${o.campaignTitle}</h1><div class="actions"><button class="btn" id="copyLink">Copy link</button><button class="btn" id="copyPass">Copy password</button><button class="btn" id="copyEmail">Copy email snippet</button><a class="btn ghost" href="${privateUrl}" target="_blank">Open private pitch</a></div><section class="grid"><article class="panel dark"><div class="label">Campaign</div><p><span class="status">${(a.status||'draft').replaceAll('_',' ')}</span></p><p><strong>Company:</strong> ${o.companyName}<br><strong>Private URL:</strong> <span class="mono">${privateUrl}</span><br><strong>Access code:</strong> <span class="mono">${o.password}</span></p><p><strong>Last interaction:</strong> ${last.date?`${fmt(last.date)} · ${last.type} · ${last.summary}`:'—'}<br><strong>Next action required:</strong> <span class="follow">${fmt(a.nextFollowUpDate)}</span></p></article><article class="panel"><div class="label">Image Prompt</div><p><span class="status">${imageStatus}</span></p><textarea id="imagePrompt" readonly>${esc(prompt)}</textarea><div class="actions"><button class="btn" id="copyImagePrompt">Copy Image Prompt</button><select id="imageStatus">${imageStatuses.map(s=>`<option ${imageStatus===s?'selected':''} value="${s}">${s}</option>`).join('')}</select></div><div class="label">Hero image preview</div>${hero}</article><article class="panel"><div class="label">Relationship</div><p><strong>${c.name||'No named contact yet'}</strong><br>${c.role||'No job title yet'}<br>${c.email?`<a href="mailto:${c.email}">${c.email}</a>`:'No email yet'}<br>${c.phone||'No phone yet'}<br>${c.linkedin?`<a href="${c.linkedin}" target="_blank">${c.linkedin}</a>`:'No LinkedIn yet'}</p><p class="muted">${c.notes||'No relationship notes yet.'}</p><form id="contactForm"><div class="label">Edit relationship details</div><input name="contactName" placeholder="Contact name" value="${c.name}"><input name="contactRole" placeholder="Job title" value="${c.role}"><input name="contactEmail" placeholder="Email" value="${c.email}"><input name="contactPhone" placeholder="Phone" value="${c.phone}"><input name="contactLinkedIn" placeholder="LinkedIn" value="${c.linkedin}"><input name="nextFollowUpDate" type="date" value="${a.nextFollowUpDate||''}"><textarea name="relationshipNotes" placeholder="Relationship notes">${c.notes}</textarea><button class="btn" type="submit">Save relationship</button></form></article><article class="panel"><div class="label">Activity timeline</div><table><thead><tr><th>Date</th><th>Type</th><th>Summary</th></tr></thead><tbody>${log.length?log.map(x=>`<tr><td>${fmt(x.date)}</td><td>${x.type}</td><td>${x.summary}</td></tr>`).join(''):'<tr><td colspan="3">No activity yet.</td></tr>'}</tbody></table></article><article class="panel"><div class="label">Quick actions</div><div class="actions">${['call','email','linkedin','meeting','note'].map(t=>`<button class="btn ghost" onclick="openLog('${t}')">${t==='linkedin'?'Log LinkedIn Message':t==='note'?'Add Note':'Log '+t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</div><form class="form" id="logForm"><input type="hidden" name="type"><label>Date<input name="date" type="date" required></label><label>Summary<textarea name="summary" required></textarea></label><button class="btn" type="submit">Save</button></form><div class="label" style="margin-top:24px">Suggested email intro</div><pre id="emailText">${email}</pre></article></section>`;const alternatives=(o.alternativeTargets||[]).sort((x,y)=>x.priority-y.priority);$('app').innerHTML=$('app').innerHTML.replace('</section>',`</section><section class="panel" id="alternative-targets" style="margin-top:20px"><div class="label">Alternative Targets</div><h2 style="font-size:clamp(2rem,4vw,3.4rem);line-height:1.1;margin:12px 0">Campaign family: ${o.campaignConcept?.headline||o.campaignFamilyId||o.campaignTitle}</h2><p class="muted">Use these as a priority sponsor list. Possible and weak fits are flagged so the angle is reviewed before sending.</p>${alternatives.length?alternatives.map(t=>`<article style="border-top:1px solid var(--line);padding:20px 0"><p><span class="status">${altStatus(t).replaceAll('_',' ')}</span></p><h3 style="font-size:1.7rem;margin:8px 0">${t.priority}. ${t.companyName} — ${t.fitStrength}</h3>${fitWarning(t.fitStrength)?`<p class="status" style="border-radius:3px;color:var(--rust)">${fitWarning(t.fitStrength)}</p>`:''}<p><strong>Why they fit:</strong> ${t.whyTheyFit}</p><p class="muted"><strong>Contact:</strong> ${t.contactName||'No contact yet'} ${t.contactRole?`· ${t.contactRole}`:''}<br>${t.contactEmail||'No email yet'}<br>${t.contactLinkedIn?`<a href="${t.contactLinkedIn}" target="_blank">${t.contactLinkedIn}</a>`:'No LinkedIn yet'}<br><strong>Notes:</strong> ${t.notes||'—'}</p><div class="actions"><button class="btn" onclick="copyAlternative(${t.priority})">Copy as new pitch</button><button class="btn ghost" onclick="markAlternative(${t.priority},'sent')">Mark as contacted</button><button class="btn ghost" onclick="markAlternative(${t.priority},'declined')">Mark as declined</button><button class="btn ghost" onclick="markAlternative(${t.priority},'converted')">Mark as converted</button><button class="btn ghost" onclick="markAlternative(${t.priority},'drafted')">Edit target</button></div></article>`).join(''):'<p>No alternative targets yet.</p>'}</section>`);$('copyLink').onclick=()=>copy(privateUrl);$('copyPass').onclick=()=>copy(o.password);$('copyEmail').onclick=()=>copy(email);$('copyImagePrompt').onclick=()=>copy(prompt);$('imageStatus').onchange=e=>{sessionStorage.setItem(`pitch-image-status:${slug}`,e.target.value)};$('contactForm').onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);save({...a,...Object.fromEntries(fd.entries())})};$('logForm').onsubmit=e=>{e.preventDefault();const fd=Object.fromEntries(new FormData(e.target).entries());const entry={date:fd.date,type:fd.type,summary:fd.summary};save({...a,lastContactDate:entry.date,lastContactMethod:entry.type,activityLog:[...(a.activityLog||[]),entry]})}}window.openLog=type=>{const f=$('logForm');f.style.display='block';f.elements.type.value=type;f.elements.date.value=new Date().toISOString().slice(0,10);f.elements.summary.focus()};window.markAlternative=markAlt;window.copyAlternative=copyAsNew;render();</script></body></html>
