<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pitch Admin | Rob Hutt</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>:root{--ink:#0d0b08;--paper:#f4efe6;--paper2:#e8dfcf;--gold:#c8962a;--gold2:#e8b13d;--rust:#9a3a1f;--line:rgba(13,11,8,.16);--dark:#15110b;--mono:'Spline Sans Mono',ui-monospace,monospace;--display:'Fraunces',Georgia,serif}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--display);-webkit-font-smoothing:antialiased}.wrap{padding:clamp(24px,5vw,70px)}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:30px;align-items:end;margin-bottom:34px}.kicker,.label{font:700 12px var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}h1{font-size:clamp(2.8rem,7vw,6.4rem);line-height:.95;font-weight:300;letter-spacing:-.045em;margin:18px 0 0}.panel{background:linear-gradient(160deg,#15110b,#20170d);color:var(--paper);border-radius:8px;padding:26px;border:1px solid rgba(232,177,61,.18);box-shadow:0 28px 70px rgba(42,26,10,.18)}.panel p{color:rgba(244,239,230,.72);line-height:1.5}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:24px 0}.stat,.card{background:rgba(232,223,207,.58);border:1px solid var(--line);border-radius:8px;padding:18px}.stat strong{display:block;font:700 22px var(--mono);margin-top:8px}.grid{display:grid;gap:16px}.card{display:grid;grid-template-columns:1.1fr .75fr .95fr .8fr .8fr .85fr;gap:16px;align-items:start}.title{font-size:1.35rem;line-height:1.1;margin:7px 0}.muted{color:rgba(13,11,8,.58);font-size:.96rem;line-height:1.45}.mono{font:500 12px var(--mono);word-break:break-word}.status{display:inline-flex;border:1px solid rgba(154,58,31,.28);border-radius:999px;padding:7px 10px;background:rgba(244,239,230,.55);font:700 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--rust)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{border:0;border-radius:3px;background:var(--gold2);color:var(--ink);padding:10px 12px;font:700 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;text-decoration:none;cursor:pointer}.btn.ghost{background:transparent;border:1px solid var(--line)}.btn.dark{background:var(--dark);color:var(--paper)}select{width:100%;background:rgba(244,239,230,.7);border:1px solid var(--line);padding:10px;font:700 12px var(--mono);text-transform:uppercase}.toast{position:fixed;right:18px;bottom:18px;background:var(--dark);color:var(--paper);padding:14px 16px;border-radius:6px;font:700 12px var(--mono);opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}@media(max-width:1200px){.hero,.card{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,1fr)}}@media(max-width:650px){.summary{grid-template-columns:1fr}}</style>
</head><body><main class="wrap"><section class="hero"><div><div class="kicker">Private admin · not public navigation</div><h1>Pitch dashboard.</h1></div><aside class="panel"><div class="label">Security note</div><p>These access codes are lightweight viewing codes for exploratory pitch pages. Relationship edits in this static admin are stored in this browser session.</p></aside></section><section class="summary" id="summary"></section><section class="grid" id="pitches"></section></main><div class="toast" id="toast">Copied</div>
<script type="module">import{opportunities}from'/assets/js/opportunities.js';const statuses=['draft','ready','sent','followed_up','replied','meeting_booked','won','lost','paused'];const root=location.origin;const today=new Date().toISOString().slice(0,10);const records=Object.entries(opportunities).map(([slug,o])=>({slug,companyName:o.companyName,campaignTitle:o.campaignTitle,privateUrl:`${root}/opportunities/${slug}`,accessPassword:o.password,...(o.pitchAdmin||{})}));const $=id=>document.getElementById(id);function copy(text){navigator.clipboard.writeText(text);$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1200)}function stored(r){return{...r,...JSON.parse(sessionStorage.getItem(`pitch-crm:${r.slug}`)||'{}')}}function mark(slug,status){sessionStorage.setItem(`pitch-status:${slug}`,status);render()}function current(r){return sessionStorage.getItem(`pitch-status:${r.slug}`)||r.status||'draft'}function last(r){const a=[...(r.activityLog||[])].sort((x,y)=>(y.date||'').localeCompare(x.date||''))[0];return a?`${a.date} · ${a.type}: ${a.summary}`:(r.lastContactDate?`${r.lastContactDate} · ${r.lastContactMethod||'contact'}`:'—')}function needs(r){return r.nextFollowUpDate&&r.nextFollowUpDate<today&&!['won','lost'].includes(current(r))}function contact(r){const legacy=r.contact||{};return{name:r.contactName||legacy.name||'',role:r.contactRole||legacy.role||'',email:r.contactEmail||legacy.email||'',phone:r.contactPhone||legacy.phone||'',linkedin:r.contactLinkedIn||legacy.linkedinUrl||'',notes:r.relationshipNotes||legacy.notes||''}}function render(){const rows=records.map(stored);const active=rows.filter(r=>!['lost','paused'].includes(current(r))).length;$('summary').innerHTML=`<div class="stat"><span class="label">Total</span><strong>${rows.length}</strong></div><div class="stat"><span class="label">Active</span><strong>${active}</strong></div><div class="stat"><span class="label">Sent</span><strong>${rows.filter(r=>['sent','followed_up','replied','meeting_booked','won'].includes(current(r))).length}</strong></div><div class="stat"><span class="label">Needs follow-up</span><strong>${rows.filter(needs).length}</strong></div>`;$('pitches').innerHTML=rows.map(r=>{const c=contact(r);return `<article class="card"><div><div class="label">Campaign</div><h2 class="title">${r.campaignTitle}</h2><p class="muted">${r.companyName}</p><div class="actions"><a class="btn dark" href="/admin/pitches/${r.slug}">Detail</a><a class="btn ghost" href="/opportunities/${r.slug}" target="_blank">Open pitch</a></div></div><div><div class="label">Status</div><span class="status">${current(r).replaceAll('_',' ')}</span><select onchange="markPitch('${r.slug}',this.value)">${statuses.map(s=>`<option ${current(r)===s?'selected':''} value="${s}">${s.replaceAll('_',' ')}</option>`).join('')}</select></div><div><div class="label">Contact</div><p class="muted"><strong>${c.name||'—'}</strong><br>${c.role||''}<br>${c.email||'No email yet'}<br>${c.phone||''}<br>${c.linkedin?`<a href="${c.linkedin}" target="_blank">LinkedIn</a>`:'No LinkedIn yet'}</p></div><div><div class="label">Last Contact</div><p class="muted">${last(r)}</p></div><div><div class="label">Next Follow-up</div><p class="muted"><strong>${needs(r)?'Needs action: ':''}${r.nextFollowUpDate||'—'}</strong><br>${c.notes}</p></div><div><div class="label">Private URL</div><p class="mono">${r.privateUrl}</p><p class="mono">Code: ${r.accessPassword}</p><div class="actions"><button class="btn" onclick="copyText('${r.privateUrl}')">Copy URL</button><button class="btn" onclick="copyText('${r.accessPassword}')">Copy password</button></div></div></article>`}).join('')}window.copyText=copy;window.markPitch=mark;render();</script></body></html>
